<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIRÉ — Digital Perfume Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">NOIRÉ</div>
        <nav class="nav-links">
            <a href="#">Collection</a>
            <a href="#">Craft</a>
            <a href="#">Journal</a>
            <a href="#">House</a>
        </nav>
        <div class="cart">
            <a href="#">Cart (0)</a>
        </div>
        <div class="menu-toggle">Menu</div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1 class="headline">
                <span class="line">Discover</span>
                <span class="line indent">the</span>
                <span class="line">Invisible</span>
            </h1>
            <div class="subtext-container">
                <p class="subtext-title">Extrait de Parfum</p>
                <p class="subtext-desc">Crafted for those who appreciate silence.</p>
            </div>
            <a href="#" class="cta-button">
                Enter Gallery <span class="arrow">→</span>
            </a>
        </div>
        
        <div class="hero-visual">
            <img
                src="assets/images/noire-bottle.png"
                alt="NOIRÉ Extrait de Parfum"
                class="hero-bottle">
        </div>
    </main>
</body>
</html>
